<!-- Title slide (class="s-title") -->
<section data-label="Title" class="s-title">
  <div class="grid-bg"></div>
  <div class="frame">
    <div class="topbar">
      <div class="eyebrow anim d1">Eyebrow</div>
      <div class="eyebrow anim d1" style="letter-spacing:.12em;">Subtitle</div>
    </div>
    <div class="mark g-text anim d2">&gt;</div>
    <div>
      <div class="eyebrow anim d2" style="margin-bottom:22px;">Category</div>
      <h1 class="anim d3">Main Title</h1>
      <p class="sub anim d4">Lead sentence goes here.</p>
      <div class="ink-rule anim d4" style="width:120px;margin-top:40px;"></div>
    </div>
  </div>
</section>

<!-- Content slide (class="s-content") -->
<section data-label="Slide Label" class="s-content">
  <div class="grid-bg"></div>
  <div class="frame">
    <div class="head">
      <div class="eyebrow anim d1">Section</div>
      <h2 class="ttl-en anim d1">Slide Heading</h2>
    </div>
    <p class="lead anim d2">Lead paragraph.</p>
    <div class="grad-rule anim d2"></div>
    <div class="tracks n3 anim d3" style="margin-top:42px;">
      <div class="track">
        <div class="tnum">01</div>
        <div class="tlabel">Point A</div>
        <p class="tbody">Body text.</p>
      </div>
      <div class="track">
        <div class="tnum">02</div>
        <div class="tlabel">Point B</div>
        <p class="tbody">Body text.</p>
      </div>
      <div class="track">
        <div class="tnum">03</div>
        <div class="tlabel">Point C</div>
        <p class="tbody">Body text.</p>
      </div>
    </div>
    <div class="pagefoot anim d4"><span>{{DECK_TITLE}}</span><span>02</span></div>
  </div>
</section>

<!-- Divider slide (class="s-divider") -->
<section data-label="01 Section Name" class="s-divider">
  <div class="grid-bg"></div>
  <div class="frame">
    <div class="topbar anim d1">
      <div class="secno">Section 01 / 07</div>
      <div class="secno">Japanese label</div>
    </div>
    <div><p class="bignum g-text anim d2">01</p></div>
    <div class="botrow">
      <div>
        <h2 class="en anim d3">Section Title</h2>
        <p class="jp anim d4">Section description.</p>
      </div>
      <div class="arrow anim d4" style="font-size:120px;color:var(--ink);line-height:.7;">&gt;</div>
    </div>
  </div>
</section>
