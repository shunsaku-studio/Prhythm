<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>F04 顧客体験を構造化する</title>
  <style>
    body{margin:0;padding:32px;background:#ffffff;font-family:'Geist',system-ui,sans-serif;color:#01010c}
    .frame{max-width:1120px;margin:0 auto}
    .eyebrow{font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8b8b97;margin:0 0 8px}
    h1{font-family:'Instrument Serif',serif;font-size:32px;font-weight:400;line-height:1.08;letter-spacing:-.02em;margin:0 0 10px}
    .subtitle{color:#5f5e5e;font-size:14px;line-height:1.5;max-width:760px;margin:0 0 20px}
    svg{width:100%;display:block}
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · Diagram Design</p>
    <h1>F04 顧客体験を構造化する</h1>
    <p class="subtitle">現状の詰まりと理想の流れを同じ絵にする</p>
    <svg viewBox="0 0 980 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="f04-usecase-title f04-usecase-desc">
      <title id="f04-usecase-title">F04 顧客体験を構造化する</title>
      <desc id="f04-usecase-desc">現状の詰まりと理想の流れを同じ絵にする</desc>
      <defs>
        <marker id="f04-usecase-arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#5f5e5e"/>
        </marker>
      </defs>
      <rect x="0" y="0" width="980" height="560" fill="#ffffff"/>
      
      <rect x="430" y="70" width="500" height="460" rx="12" fill="none" stroke="rgba(1,1,12,0.12)" stroke-width="1.2" stroke-dasharray="6 5"/>
      <rect x="454" y="54" width="92" height="20" rx="4" fill="#ffffff"/>
      <text x="500" y="68" fill="#8b8b97" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.16em">USE CASES</text>
    
<line x1="235" y1="186" x2="486" y2="154" stroke="#5f5e5e" stroke-width="1.6" marker-end="url(#f04-usecase-arrow)"/>
<line x1="235" y1="186" x2="486" y2="284" stroke="#5f5e5e" stroke-width="1.6" marker-end="url(#f04-usecase-arrow)"/>
<line x1="235" y1="186" x2="486" y2="414" stroke="#5f5e5e" stroke-width="1.6" marker-end="url(#f04-usecase-arrow)"/>
      
    <rect x="90" y="150" width="140" height="72" rx="36" fill="#ffffff" stroke="#8b8b97" stroke-width="1.4"/>
    <circle cx="114" cy="186" r="10" fill="none" stroke="#8b8b97" stroke-width="1.2"/>
    <line x1="114" y1="196" x2="114" y2="210" stroke="#8b8b97" stroke-width="1.2"/>
    <line x1="108" y1="202" x2="120" y2="202" stroke="#8b8b97" stroke-width="1.2"/>
    <text x="134" y="180" fill="#01010c" font-size="12" font-weight="600" font-family="'Geist',sans-serif"><tspan x="160" dy="0">バンドメンバー</tspan></text>
  

    <ellipse cx="680" cy="154" rx="170" ry="42" fill="rgba(60,130,200,0.08)" stroke="#3c82c8" stroke-width="1.2"/>
    <text x="680" y="150" fill="#01010c" font-size="12" font-weight="600" font-family="'Geist',sans-serif" text-anchor="middle"><tspan x="680" dy="0">現状の詰まりを可視化する</tspan></text>
  

    <ellipse cx="680" cy="284" rx="170" ry="42" fill="#f5f6f8" stroke="#5f5e5e" stroke-width="1.2"/>
    <text x="680" y="280" fill="#01010c" font-size="12" font-weight="600" font-family="'Geist',sans-serif" text-anchor="middle"><tspan x="680" dy="0">理想の流れを描く</tspan></text>
  

    <ellipse cx="680" cy="414" rx="170" ry="42" fill="#f5f6f8" stroke="#5f5e5e" stroke-width="1.2"/>
    <text x="680" y="410" fill="#01010c" font-size="12" font-weight="600" font-family="'Geist',sans-serif" text-anchor="middle"><tspan x="680" dy="0">中心シーンを選ぶ</tspan></text>
  
    </svg>
  </div>

</html>
